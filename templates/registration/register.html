{% load static %}
<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="utf-8" />
    <title>Ro'yxatdan o'tish | Mayli Restobar Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Mayli Restobar - Yangi admin qo'shish" name="description" />

    <!-- App favicon -->
    <link rel="shortcut icon" href="{% static 'assets/images/favicon.ico' %}">

    <!-- Theme Config Js -->
    <script src="{% static 'assets/js/config.js' %}"></script>

    <!-- Vendor css -->
    <link href="{% static 'assets/css/vendor.min.css' %}" rel="stylesheet" type="text/css" />

    <!-- App css -->
    <link href="{% static 'assets/css/app.min.css' %}" rel="stylesheet" type="text/css" id="app-style" />

    <!-- Icons css -->
    <link href="{% static 'assets/css/icons.min.css' %}" rel="stylesheet" type="text/css" />
</head>

<body>

    <div class="auth-bg d-flex min-vh-100">
        <div class="row g-0 justify-content-center w-100 m-xxl-5 px-xxl-4 m-3">
            <div class="col-xxl-3 col-lg-5 col-md-6">
                <a href="{% url 'home' %}" class="auth-brand d-flex justify-content-center mb-2">
                    <img src="{% static 'assets/images/logo-dark.png' %}" alt="dark logo" height="26" class="logo-dark">
                    <img src="{% static 'assets/images/logo.png' %}" alt="logo light" height="26" class="logo-light">
                </a>

                <p class="fw-semibold mb-4 text-center text-muted fs-15">Mayli Restobar - Boshqaruv Tizimi</p>

                <div class="card overflow-hidden text-center p-xxl-4 p-3 mb-0">

                    <h4 class="fw-semibold mb-3 fs-18">Yangi hisob yaratish</h4>

                    {% if error %}
                    <div class="alert alert-danger text-start fs-13 mb-3" role="alert">
                        <i class="bx bx-error-circle me-1"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="post" action="{% url 'register' %}" class="text-start mb-3">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label" for="phone">Telefon raqami</label>
                            <input type="tel" id="phone" name="phone" class="form-control"
                                placeholder="+998 (__) ___-__-__" value="{{ phone|default:'' }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">Parol</label>
                            <input type="password" id="password" name="password" class="form-control"
                                placeholder="Kuchli parol yarating" required>
                        </div>

                        <div class="d-flex justify-content-between mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="checkbox-signup" required>
                                <label class="form-check-label" for="checkbox-signup">Men barcha <a href="#!"
                                        class="link-dark text-decoration-underline">Shartlarga</a> roziman</label>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary fw-semibold" type="submit">Ro'yxatdan o'tish</button>
                        </div>
                    </form>

                    <p class="text-muted fs-14 mb-0">Hisobingiz bormi? <a href="{% url 'login' %}"
                            class="fw-semibold text-danger ms-1">Tizimga kirish !</a></p>
                </div>
                <p class="mt-4 text-center mb-0">
                    <script>document.write(new Date().getFullYear())</script> © Mayli Restobar - Boshqaruv Tizimi
                </p>
            </div>
        </div>
    </div>

    <!-- Vendor js -->
    <script src="{% static 'assets/js/vendor.min.js' %}"></script>

    <!-- App js -->
    <script src="{% static 'assets/js/app.js' %}"></script>

    <!-- IMask JS for Phone Masking -->
    <script src="{% static 'src/libs/imask.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var phoneElement = document.getElementById('phone');
            var maskOptions = {
                mask: '+998 (00) 000-00-00',
                lazy: false
            };
            var mask = IMask(phoneElement, maskOptions);
        });
    </script>

</body>

</html>
