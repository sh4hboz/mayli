{% load static %}
<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="utf-8" />
    <title>Xodimlar Portali | Mayli Restobar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Mayli Restobar - Xodimlar kirish portali" name="description" />

    <!-- App favicon -->
    <link rel="shortcut icon" href="{% static 'assets/images/favicon.ico' %}">

    <!-- Theme Config Js -->
    <script src="{% static 'assets/js/config.js' %}"></script>

    <!-- Vendor css -->
    <link href="{% static 'assets/css/vendor.min.css' %}" rel="stylesheet" type="text/css" />

    <!-- App css -->
    <link href="{% static 'assets/css/app.min.css' %}" rel="stylesheet" type="text/css" id="app-style" />

    <!-- Icons css -->
    <link href="{% static 'assets/css/icons.min.css' %}" rel="stylesheet" type="text/css" />
</head>

<body>

    <div class="auth-bg d-flex min-vh-100">
        <div class="row g-0 justify-content-center w-100 m-xxl-5 px-xxl-4 m-3">
            <div class="col-xxl-3 col-lg-5 col-md-6">
                <a href="{% url 'home' %}" class="auth-brand d-flex justify-content-center mb-2">
                    <img src="{% static 'assets/images/logo-dark.png' %}" alt="dark logo" height="26" class="logo-dark">
                    <img src="{% static 'assets/images/logo.png' %}" alt="logo light" height="26" class="logo-light">
                </a>

                <p class="fw-semibold mb-4 text-center text-muted fs-15">Mayli Restobar - Xodimlar Portali</p>

                <div class="card overflow-hidden p-xxl-4 p-3 mb-0">

                    <h4 class="text-center fw-bold fs-18 mb-1">Xodimlar Kirishi</h4>
                    <p class="text-muted text-center fs-13 mb-4">Menejer, Admin, Ofitsiant va Barmanlar uchun tizimga kirish.</p>

                    {% if error %}
                    <div class="alert alert-danger text-start fs-13 mb-3" role="alert">
                        <i class="bx bx-error-circle me-1"></i> {{ error }}
                    </div>
                    {% endif %}

                    <!-- Xodimlar Kirish Formasi -->
                    <form method="post" action="{% url 'login' %}" class="text-start mb-3">
                        {% csrf_token %}
                        <input type="hidden" name="user_type" value="staff">
                        
                        <div class="mb-3">
                            <label class="form-label" for="username">Login (Foydalanuvchi nomi)</label>
                            <input type="text" id="username" name="username" class="form-control"
                                placeholder="Masalan: waiter_ali, manager1" value="{{ username|default:'' }}" required autocomplete="off">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="staffPassword">PIN Kod yoki Parol</label>
                            <input type="password" id="staffPassword" name="password" class="form-control"
                                placeholder="PIN yoki parolingizni kiriting" required autocomplete="off">
                        </div>

                        <div class="mb-3 fs-13">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="checkbox-staff">
                                <label class="form-check-label" for="checkbox-staff">Eslab qolish</label>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary fw-semibold" type="submit">Xodim sifatida kirish</button>
                        </div>
                    </form>

                </div>
                <p class="mt-4 text-center mb-0">
                    <script>document.write(new Date().getFullYear())</script> © Mayli Restobar
                </p>
            </div>
        </div>
    </div>

    <!-- Vendor js -->
    <script src="{% static 'assets/js/vendor.min.js' %}"></script>

    <!-- App js -->
    <script src="{% static 'assets/js/app.js' %}"></script>

</body>

</html>
