{% load static i18n %}

<!-- FLOATING BUTTONS -->
<div class="floating-btns" id="floatingBtns">
  <!-- Aylanuvchi slot: tel / tg / ig -->
  <div class="fab-rotate-slot" id="fabRotateSlot">
    {% if site.phone_main %}
    <a href="tel:{{ site.phone_main }}" class="fab-btn fab-tel fab-rotate-item fab-rotate-active" data-fab-index="0" title="{% trans "Qo'ng'iroq qilish" %}">
      <i class="fa fa-phone"></i>
    </a>
    {% endif %}
    {% if site.social_links.telegram_bot %}
    <a href="{{ site.social_links.telegram_bot.url }}" target="_blank" rel="noopener" class="fab-btn fab-tg fab-rotate-item" data-fab-index="1" title="{{ site.social_links.telegram_bot.title }}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.04 9.613c-.15.669-.543.832-1.1.517l-3.04-2.24-1.468 1.414c-.162.162-.298.298-.61.298l.217-3.088 5.607-5.065c.244-.217-.053-.337-.378-.12L6.89 14.408l-2.98-.93c-.648-.203-.66-.648.135-.96l11.634-4.487c.54-.197 1.013.12.883.217z"/></svg>
    </a>
    {% endif %}
    {% if site.social_links.instagram %}
    <a href="{{ site.social_links.instagram.url }}" target="_blank" rel="noopener" class="fab-btn fab-ig fab-rotate-item" data-fab-index="2" title="{{ site.social_links.instagram.title }}">
      <i class="fa fa-instagram"></i>
    </a>
    {% endif %}
  </div>
  <button class="fab-btn fab-chat" id="chatOpenBtn" title="{% trans "Chat" %}">
    <i class="fa fa-comment"></i>
  </button>
  <button class="fab-btn fab-top" id="scrollTopBtn" title="{% trans "Yuqoriga" %}">
    <i class="fa fa-arrow-up"></i>
  </button>
</div>
