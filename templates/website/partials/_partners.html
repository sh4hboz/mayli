{% load static i18n %}

<!-- PARTNERS -->
<section class="section partners" id="partners">
  <div class="container">
    <div class="section-header reveal">
      <span class="section-badge">{% trans "Hamkorlar" %}</span>
      <h2 class="section-title">{% trans "Bizning hamkorlarimiz" %}</h2>
    </div>

    <div class="swiper partners-swiper">
      <div class="swiper-wrapper">
        {% comment %} Hozircha placeholder — o'zimizning logo. Keyin haqiqiy hamkor logolari bilan almashtiriladi. {% endcomment %}
        {% for i in "12345678" %}
        <div class="swiper-slide">
          <div class="partner-item">
            <img src="{% static 'src/img/icons/logo-black.png' %}" alt="{% trans 'Hamkor' %}" loading="lazy">
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
