{% load i18n %}

<!-- BOOKING CTA -->
<section class="section booking-cta reveal">
  <div class="container booking-cta-inner">
    <span class="section-badge">{% trans "Bron qilish" %}</span>
    <h2 class="section-title">{% trans "Stolingizni oldindan band qiling" %}</h2>
    <p class="booking-cta-desc">
      {% trans "Eng yaxshi joyni kafolatlash uchun bir necha soniyada bron qoldiring — qolganini biz hal qilamiz." %}
    </p>
    <button type="button" class="btn btn-primary booking-cta-btn" data-booking-open>
      <i class="fa fa-calendar-check-o"></i> {% trans "Hozir bron qilish" %}
    </button>
  </div>
</section>
