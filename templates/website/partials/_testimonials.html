{% load i18n %}

<!-- TESTIMONIALS -->
{% if testimonials %}
<section class="section section-dark2" id="testimonials">
  <div class="container">
    <div class="section-header reveal">
      <span class="section-badge">{% trans "Sharhlar" %}</span>
      <h2 class="section-title">{% trans "Mehmonlarimiz fikri" %}</h2>
    </div>
    <div class="swiper testimonials-swiper">
      <div class="swiper-wrapper">
        {% for t in testimonials %}
        <div class="swiper-slide">
          <div class="testimonial-card">
            <div class="testimonial-stars">
              {% for i in "12345" %}{% if forloop.counter <= t.rating %}★{% else %}☆{% endif %}{% endfor %}
            </div>
            <div class="testimonial-text">"{{ t.text }}"</div>
            <div class="testimonial-author">— {{ t.author }}</div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>
{% endif %}
