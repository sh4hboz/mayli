{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'uz' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — {% trans "Sahifa topilmadi" %} | Mayli Restobar</title>
  <link rel="icon" href="{% static 'src/img/icons/favicon.png' %}" type="image/png">
  <link rel="stylesheet" href="{% static 'src/style.css' %}">

  <style>
    .error-page { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px; background:var(--dark); }
    .error-code { font-size:clamp(6rem,20vw,12rem); font-weight:900; color:transparent; -webkit-text-stroke:2px rgba(197,160,89,.3); line-height:1; margin-bottom:8px; }
    .error-title { font-size:clamp(1.4rem,3vw,2rem); font-weight:700; margin-bottom:16px; }
    .error-desc { color:var(--text-muted); margin-bottom:36px; max-width:400px; margin-left:auto; margin-right:auto; }
    .error-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">{% trans "Sahifa topilmadi" %}</h1>
      <p class="error-desc">{% trans "Siz qidirayotgan sahifa mavjud emas yoki ko'chirilgan." %}</p>
      <div class="error-actions">
        <a href="/" class="btn btn-primary">{% trans "Bosh sahifaga" %}</a>
        <a href="/menu/" class="btn btn-outline">{% trans "Menyu" %}</a>
      </div>
    </div>
  </div>
</body>
</html>
