{% load static %}
<!doctype html>
<html lang="en" data-skin="default" data-bs-theme="dark" data-menu-color="dark" data-topbar-color="light" data-layout-width="fluid" dir="ltr" data-sidenav-size="offcanvas" data-layout-position="fixed">
<head>
        <meta charset="utf-8" />
        <title>eCommerce Dashboard | Paces - Multipurpose Tailwind CSS & Bootstrap Admin Dashboard Template</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Paces is a modern, responsive admin dashboard available on ThemeForest. Ideal for building CRM, CMS, project management tools, and custom web applications with a clean UI, flexible layouts, and rich features." />
        <meta name="keywords" content="Paces, admin dashboard, ThemeForest, Bootstrap 5 admin, responsive admin, CRM dashboard, CMS admin, web app UI, admin theme, premium admin template" />
        <meta name="author" content="Coderthemes" />

        <!-- App favicon -->
        <link rel="shortcut icon" href="{% static 'assets/images/favicon.ico' %}" />


        <!-- Vector Maps css -->
        <link href="{% static 'assets/plugins/jsvectormap/jsvectormap.min.css' %}" rel="stylesheet" type="text/css" />

        <!-- Theme Config Js -->
        <script src="{% static 'assets/js/config.js' %}"></script>

        <!-- Vendor css -->
        <link href="{% static 'assets/css/vendor.min.css' %}" rel="stylesheet" type="text/css" />

        <!-- App css -->
        <link id="app-style" href="{% static 'assets/css/app.min.css' %}" rel="stylesheet" type="text/css" />

    </head>

    <body>
        <!-- Begin page -->
        <div class="wrapper">
            {% include 'management/partials/topbar.html' %}
            <!-- Topbar End -->

            {% include 'management/partials/sidebar.html' %}
            <!-- Sidenav Menu End -->


            <!-- ============================================================== -->
            <!-- Start Main Content -->
            <!-- ============================================================== -->

            {% block content %}
            {% endblock content %}

            <!-- ============================================================== -->
            <!-- End of Main Content -->
            <!-- ============================================================== -->
        </div>
        <!-- END wrapper -->

        <!-- Vendor js -->
        <script src="{% static 'assets/js/vendors.min.js' %}"></script> 

        <!-- App js -->
        <script src="{% static 'assets/js/app.js' %}"></script>


        <!-- Apex Chart js -->
        <script src="{% static 'assets/plugins/apexcharts/apexcharts.min.js' %}"></script>

        <!-- Vector Map Js -->
        <script src="{% static 'assets/plugins/jsvectormap/jsvectormap.min.js' %}"></script>
        <script src="{% static 'assets/js/maps/world-merc.js' %}"></script>
        <script src="{% static 'assets/js/maps/world.js' %}"></script>

        <!-- Custom table -->
        <script src="{% static 'assets/js/pages/custom-table.js' %}"></script>

        <!-- Dashboard js -->
        <script src="{% static 'assets/js/pages/dashboard-ecommerce.js' %}"></script>
    </body>

</html>
