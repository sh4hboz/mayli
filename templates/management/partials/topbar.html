{% load static %}
<header class="app-topbar">
    <div class="container-fluid topbar-menu">
        <div class="d-flex align-items-center gap-2">
            <!-- Topbar Brand Logo -->
            <div class="logo-topbar">
                <!-- Logo light -->
                <a href="{% url 'dashboard_home' %}" class="logo-light">
                    <span class="logo-lg">
                        <!-- <img src="{% static 'assets/images/logo.png' %}" alt="logo" /> -->
                        <img src="{% static 'src/img/icons/logo-lg.svg' %}" alt="Mayli Logo">
                    </span>
                    <span class="logo-sm">
                        <img src="{% static 'src/img/icons/logo-lg.svg' %}" alt="Mayli Logo">
                    </span>
                </a>

                <!-- Logo Dark -->
                <a href="{% url 'dashboard_home' %}" class="logo-dark">
                    <span class="logo-lg">
                        <img src="{% static 'src/img/icons/logo-lg-black.svg' %}" alt="Mayli Logo">
                    </span>
                    <span class="logo-sm">
                        <img src="{% static 'src/img/icons/logo-lg-black.svg' %}" alt="Mayli Logo">
                    </span>
                </a>
            </div>

            <!-- Sidebar Menu Toggle Button -->
            <button class="sidenav-toggle-button btn btn-primary btn-icon">
                <i class="ti ti-menu-4"></i>
            </button>

            <!-- Horizontal Menu Toggle Button -->
            <button class="topnav-toggle-button px-2" data-bs-toggle="collapse" data-bs-target="#topnav-menu">
                <i class="ti ti-menu-4"></i>
            </button>

            <div id="search-box-rounded" class="app-search d-none d-xl-flex position-relative">
                <input type="search" id="global-search-input" name="search" autocomplete="off"
                       class="form-control rounded-pill topbar-search"
                       placeholder="Qidirish: buyurtma, mijoz, taom..."
                       data-search-url="{% url 'dashboard_search' %}" />
                <i class="ti ti-search app-search-icon text-muted"></i>
                <div id="global-search-results" class="dropdown-menu shadow global-search-results" role="listbox" hidden></div>
            </div>

        </div>

        <div class="d-flex align-items-center gap-2">
            <a href="{{ public_site_url|default:'/' }}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-primary d-none d-sm-inline-flex align-items-center gap-1">
                <i class="ti ti-world"></i>
                <span>Saytni ko'rish</span>
            </a>

            <div id="theme-dropdown" class="topbar-item d-sm-flex">
                <div class="dropdown">
                    <button class="topbar-link" data-bs-toggle="dropdown" type="button" aria-haspopup="false" aria-expanded="false">
                        <i class="ti ti-sun topbar-link-icon d-none" id="theme-icon-light"></i>
                        <i class="ti ti-moon topbar-link-icon d-none" id="theme-icon-dark"></i>
                        <i class="ti ti-sun-moon topbar-link-icon d-none" id="theme-icon-system"></i>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end" data-thememode="dropdown">
                        <label class="dropdown-item cursor-pointer">
                            <input class="form-check-input d-none" type="radio" name="data-bs-theme" value="light" />
                            <i class="ti ti-sun align-middle me-1 fs-16"></i>
                            <span class="align-middle">Light</span>
                        </label>
                        <label class="dropdown-item cursor-pointer">
                            <input class="form-check-input d-none" type="radio" name="data-bs-theme" value="dark" />
                            <i class="ti ti-moon align-middle me-1 fs-16"></i>
                            <span class="align-middle">Dark</span>
                        </label>
                    </div>
                    <!-- end dropdown-menu-->
                </div>
                <!-- end dropdown-->
            </div>

            {% include "management/partials/_topbar_notifications.html" %}

            <div id="fullscreen-toggler" class="topbar-item d-none d-md-flex">
                <button class="topbar-link" type="button" data-toggle="fullscreen">
                    <i class="ti ti-maximize topbar-link-icon"></i>
                    <i class="ti ti-minimize topbar-link-icon d-none"></i>
                </button>
            </div>

            <div id="user-dropdown-detailed" class="topbar-item nav-user">
                <div class="dropdown">
                    <a class="topbar-link dropdown-toggle drop-arrow-none px-2" data-bs-toggle="dropdown" href="#!" aria-haspopup="false" aria-expanded="false">
                        <div class="avatar-sm avatar-32 rounded-circle me-lg-2 d-flex align-items-center justify-content-center bg-primary text-white fw-bold">
                            {{ profile.user.first_name|first|upper }}{{ profile.user.last_name|first|upper }}
                        </div>
                        <div class="d-lg-flex align-items-center gap-1 d-none">
                            <span>
                                <h5 class="my-0 lh-1 pro-username">{{ profile.get_full_name|default:"Admin" }}</h5>
                                <span class="fs-xs lh-1">{{ profile.get_role_display|default:"Administrator" }}</span>
                            </span>
                            <i class="ti ti-chevron-down align-middle"></i>
                        </div>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end">
                        <!-- Lock -->
                        <a href="{% url 'dashboard_lock_screen' %}" class="dropdown-item">
                            <i class="ti ti-lock me-1 fs-lg align-middle"></i>
                            <span class="align-middle">Lock Screen</span>
                        </a>

                        <!-- Logout -->
                        <a href="/logout/" class="dropdown-item fw-semibold text-danger">
                            <i class="ti ti-logout me-1 fs-lg align-middle"></i>
                            <span class="align-middle">Log Out</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
<!-- Topbar End -->
