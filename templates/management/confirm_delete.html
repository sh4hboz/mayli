{% extends 'management/base.html' %}
{% block title %}O'chirishni tasdiqlash | Mayli Restobar{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="ti ti-alert-triangle text-danger fs-1 mb-3 d-block"></i>
                <h4 class="mb-2">O'chirishni tasdiqlang</h4>
                <p class="text-muted mb-4">Bu amalni ortga qaytarib bo'lmaydi. Davom etasizmi?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Ha, o'chirish</button>
                    <a href="javascript:history.back();" class="btn btn-secondary">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
