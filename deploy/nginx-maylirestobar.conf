# Mayli Restobar — nginx (HTTPS terminatsiya + gunicorn proxy)
# /etc/nginx/sites-available/maylirestobar.uz ga joylang va
# /etc/nginx/sites-enabled/ ga symlink qiling. Yo'llarni moslang.

upstream mayli_gunicorn {
    server unix:/run/gunicorn/mayli.sock;
}

# --- HTTP -> HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name maylirestobar.uz www.maylirestobar.uz;

    # certbot yangilashlari uchun (ACME challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name maylirestobar.uz www.maylirestobar.uz;

    # SSL (certbot bilan olingan sertifikatlar)
    ssl_certificate     /etc/letsencrypt/live/maylirestobar.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maylirestobar.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Admin/dashboard orqali rasm yuklash uchun (media upload)
    client_max_body_size 25M;

    # Statik fayllar (collectstatic chiqishi) — nginx to'g'ridan-to'g'ri beradi
    location /static/ {
        alias /var/www/mayli/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Yuklangan media fayllar
    location /media/ {
        alias /var/www/mayli/media/;
        expires 30d;
        access_log off;
    }

    # Qolgan hammasi -> gunicorn
    location / {
        proxy_pass http://mayli_gunicorn;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # SECURE_PROXY_SSL_HEADER uchun SHART
        proxy_redirect off;
    }
}
